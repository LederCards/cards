- id: ROOT-22
  text: >-
    Protect: When defending in battle, before the roll, a faction may enlist the Arbiter if he's in the battle clearing.
    The Arbiter scores one point and adds undamaged swords to the defender's maximum rolled hits.
  image: vagabond-arbiter
  name: Arbiter
  tags:
    - Riverfolk
    - Vagabond
- id: ROOT-24
  text: >-
    Scorched Earth: Place this torch in your clearing. Remove all enemy pieces
    there. Pieces can no longer be placed in or moved into this clearing.
  image: vagabond-scoundrel
  name: Scoundrel
  tags:
    - Riverfolk
    - Vagabond
- id: ROOT-27
  text: >-
    Instigate: Force a player to battle a player you choose in your clearing.
    Treat removed pieces as if you removed them.
    (Errata: Instigate: Force a player to battle a player you choose in your clearing.
    Treat removed Buildings and Tokens as if you removed them.)
  image: vagabond-vagrants
  name: Vagrant
  tags:
    - Riverfolk
    - Vagabond
